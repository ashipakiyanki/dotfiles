# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf

###################
#### MONITORS #####
###################
{{#each MONITORS}}
monitor={{this.name}},{{this.width}}x{{this.height}}@{{this.refresh_rate}},{{this.x}}x{{this.y}},1.0
{{/each}}

###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = $terminal yazi
$menu = fuzzel

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = hyprctl dispatch workspace 1
exec-once = hyprlock
exec-once = systemctl --user start hyprpolkitagent
exec-once = hyprpaper
exec-once = hypridle
exec-once = wl-paste --watch cliphist store
exec-once = hyprpm reload
exec-once = blueman-applet
exec-once = nm-applet
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec = killall mprisence; sleep 0.1; mprisence
exec = killall waybar; sleep 0.1; waybar
exec = killall cava
exec = sunsetr restart
{{#if LAPTOP}}
exec = ~/bin/laptop_visualizer
{{else}}
exec = ~/bin/desktop_visualizer
{{/if}}

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Ice
env = EDITOR,nvim
# env = AQ_DRM_DEVICES,/dev/dri/amd-gpu:/dev/dri/nvidia-gpu
#env = GBM_BACKEND,nvidia-drm
#env = __GLX_VENDOR_LIBRARY_NAME,nvidia
#env = LIBVA_DRIVER_NAME,nvidia
#env = __NV_PRIME_RENDER_OFFLOAD,1
#env = __NV_DISABLE_EXPLICIT_SYNC,1

###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 4
    gaps_out = 12

    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(4060ffff)
    col.inactive_border = rgba(80808080)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = true
    # layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 8
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1
    inactive_opacity = 0.92

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    
    animation = windows,       1,     2,     easeInOutCubic
    animation = windowsIn,     1,     4.1,   easeOutQuint, slide
    animation = windowsOut,    1,     1.49,  linear,       slide

    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade

    animation = fade,          1,     3.03,  quick
    animation = fadeSwitch,    1,     5,     quick
    animation = fadeIn,        1,     2,  almostLinear
    animation = fadeOut,       1,     2,  almostLinear
    animation = fadeLayersIn,  1,     2,  almostLinear
    animation = fadeLayersOut, 1,     2,  almostLinear

    animation = border,        1,     3,     linear

    animation = workspaces,    1,     6,     easeOutQuint, slide 150%
    animation = zoomFactor,    1,     7,     quick
}

{{#each WORKSPACES}}
{{#if this.default}}
workspace = {{math @index "+" 1}}, monitor:{{this.name}}, persistent:true, default:true
{{else}}
workspace = {{math @index "+" 1}}, monitor:{{this.name}}, persistent:true
{{/if}}
{{/each}}

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
# dwindle {
   # pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
   # preserve_split = true # You probably want this
# }

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    allow_session_lock_restore = 1
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us

    follow_mouse = 2
    float_switch_override_focus = 2

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

bind = $mainMod, T, exec, $terminal
bind = $mainMod, Y, exec, $fileManager
bind = $mainMod, A, exec, $menu

bind = $mainMod, C, exec, crt_manager
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, P, exec, hyprpicker
bindl = $mainMod SHIFT, S, exec, hyprshot -m region --clipboard-only --freeze
bindl = $mainMod, S, exec, hyprshot -m output --clipboard-only

bind = $mainMod, F, fullscreen
#bind = $mainMod, J, togglesplit,
bind = $mainMod, K, killactive,
bind = $mainMod SHIFT, K, forcekillactive
bind = $mainMod, R, exec, hyprctl reload
bind = $mainMod, V, exec, cliphist-fuzzel-img
bind = $mainMod, W, togglefloating,

# Move focus with mainMod + arrow key#s
binde = $mainMod, left, movefocus, l
binde = $mainMod, right, movefocus, r
binde = $mainMod, up, movefocus, u
binde = $mainMod, down, movefocus,d

binde = $mainMod SHIFT, left, movewindow,l
binde = $mainMod SHIFT, right, movewindow,r
binde = $mainMod SHIFT, up, movewindow,u
binde = $mainMod SHIFT, down, movewindow,d

{{#each WORKSPACES}}
bind = $mainMod, {{math @index "+" 1}}, workspace, {{this.str}}{{math @index "+" 1}}
bind = $mainMod SHIFT, {{math @index "+" 1}}, movetoworkspacesilent, {{this.str}}{{math @index "+" 1}}
{{/each}}

{{#each MONITORS}}
bind = $mainMod ALT, {{math @index "+" 1}}, movewindow, mon:{{this.name}}
{{/each}}

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl set 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 10%-

# Requires playerctl
{{#if LAPTOP}}
bindl = , pause, exec, playerctl play-pause
bindl = $mainMod, pause, exec, audacious cdda://
{{else}}
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = $mainMod, XF86AudioPlay, exec, audacious cdda://
{{/if}}
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*$terminal sudo yazi

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

windowrule {
	name = sound_control
	match:class = org.pulseaudio.pavucontrol

	float = yes
	size = 800 600
	center = yes
}

windowrule {
	name = bt_control
	match:class = blueman-manager

	float = yes
	size = 800 600
	center = yes
}

windowrule {
    name = minecraft
    match:class = ^.*Minecraft.*$

    monitor = HDMI-A-1
    fullscreen = on
}

###############
### PLUGINS ###
###############
plugin {

}
