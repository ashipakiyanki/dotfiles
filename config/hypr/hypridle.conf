general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch "hl.dsp.dpms({ action = 'enable' })"
}

{{#if LAPTOP}}
listener {
    timeout = 5
    on-timeout = brightnessctl -sd tpacpi::kbd_backlight set 1
    on-resume = brightnessctl -sd tpacpi::kbd_backlight set 2
}

listener {
    timeout = 15
    on-timeout = brightnessctl -sd tpacpi::kbd_backlight set 0
    on-resume = brightnessctl -sd tpacpi::kbd_backlight set 2
}

listener {
    timeout = 60
    on-timeout = brightnessctl -s set 0
    on-resume = brightnessctl -r
}

listener {
    timeout = 120
    on-timeout = hyprctl dispatch "hl.dsp.dpms({ action = 'disable' })" && hyprlock & disown
    on-resume = hyprctl dispatch "hl.dsp.dpms({ action = 'enable' })"
}
{{else}}
listener {
    timeout = 30
    on-timeout = pidof hyprlock && hyprctl dispatch "hl.dsp.dpms({ action = 'disable' })"
    on-resume = hyprctl dispatch "hl.dsp.dpms({ action = 'enable' })" && pidof hyprlock && hyprctl reload
}
{{/if}}
